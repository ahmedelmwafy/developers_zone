name: developers_zone
description: A social and communication platform for developers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.5
  
  # State Management
  provider: ^6.0.5
  shimmer: ^3.0.0
  
  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_messaging: ^16.1.3
  fluttertoast: ^9.0.0
  
  # Networking & Images
  http: ^1.1.0
  googleapis_auth: ^1.4.1
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4
  
  # Integration
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  google_mobile_ads: ^7.0.0
  url_launcher: ^6.2.1
  
  # Utils
  intl: ^0.20.2
  timeago: ^3.6.1
  intl_phone_field: ^3.2.0 # maybe not needed as phone is not required
  font_awesome_flutter: ^11.0.0
  path: ^1.8.3
  uuid: ^4.2.1
  shared_preferences: ^2.2.2
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.3.6

flutter_native_splash:
  color: "#0F0E17"
  image: assets/images/logo.png
  android: true
  ios: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/translations/
    - assets/service_account.json
